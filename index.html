<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligne Espoir — Bénin</title>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--rouge: #b91c1c;
--rose: #be185d;
--rose-clair: #fdf2f8;
--gris: #374151;
--gris-clair: #f9fafb;
--gris-texte: #6b7280;
--blanc: #ffffff;
--bordure: #e5e7eb;
}

body {
font-family: system-ui, -apple-system, sans-serif;
font-size: 16px;
line-height: 1.5;
color: var(--gris);
background: var(--gris-clair);
}

a { text-decoration: none; color: inherit; }

/* QUITTER */
#quitter {
position: fixed;
top: 10px;
right: 10px;
z-index: 9999;
background: rgba(255,255,255,0.9);
color: #666;
border: 1px solid #ddd;
padding: 6px 12px;
font-size: 12px;
border-radius: 20px;
cursor: pointer;
}

/* BLOCS */
.bloc { padding: 20px 16px; border-bottom: 1px solid var(--bordure); }

/* DANGER */
.bloc-danger {
background: var(--rouge);
color: #fff;
}

.bloc-danger .titre {
font-size: 18px;
font-weight: 800;
margin-bottom: 12px;
}

.btn-urgence {
display: flex;
align-items: center;
gap: 12px;
background: #fff;
color: var(--rouge);
font-weight: 700;
padding: 14px;
border-radius: 8px;
margin-bottom: 8px;
}

/* LIGNE */
.bloc-ligne {
background: var(--rose-clair);
border-left: 4px solid var(--rose);
}

.bloc-ligne .titre {
font-weight: 700;
color: var(--rose);
margin-bottom: 6px;
}

.bloc-ligne .sous-titre {
color: var(--gris-texte);
margin-bottom: 14px;
}

.btn-rose {
display: block;
background: var(--rose);
color: #fff;
padding: 14px;
border-radius: 8px;
margin-bottom: 8px;
font-weight: 700;
}

.btn-rose.wa {
background: #15803d;
}

/* SECURITE */
.bloc-securite {
background: #1e293b;
color: #e2e8f0;
font-size: 13px;
}

/* FORM */
.bloc-form {
background: var(--blanc);
}

.form-group {
margin-bottom: 12px;
}

.form-group input,
.form-group select {
width: 100%;
padding: 12px;
border: 1px solid var(--bordure);
border-radius: 6px;
}

.btn-envoyer {
width: 100%;
padding: 14px;
background: #4b5563;
color: white;
border: none;
border-radius: 8px;
font-weight: 700;
}

/* INFO */
.bloc-info {
background: var(--blanc);
}

footer {
padding: 16px;
text-align: center;
font-size: 12px;
color: var(--gris-texte);
}

/* TOAST */
#toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%) translateY(100px);
background: #111;
color: white;
padding: 10px 20px;
border-radius: 8px;
transition: 0.3s;
}

#toast.show {
transform: translateX(-50%) translateY(0);
}

@media (min-width: 600px) {
body {
max-width: 480px;
margin: auto;
}
}
</style>
</head>

<body>

<button id="quitter" onclick="quitterVite()">✕ Fermer</button>

<!-- DANGER -->
<div class="bloc bloc-danger">
<p class="titre">🚨 En danger immédiat ?</p>

<a href="tel:117" class="btn-urgence">📞 117 — Police</a>
<a href="tel:166" class="btn-urgence">📞 166 — Urgence</a>
<a href="tel:118" class="btn-urgence">📞 118 — Pompiers</a>
</div>

<!-- LIGNE -->
<div class="bloc bloc-ligne">
<p class="titre">💜 Besoin d’aide ?</p>
<p class="sous-titre">Écoute · Orientation · Confidentialité<br><strong>Pas une urgence</strong></p>

<a href="tel:+2290164596381" class="btn-rose">📞 Appeler</a>
<a href="https://wa.me/2290164596381" class="btn-rose wa">💬 WhatsApp</a>
</div>

<!-- FORM -->
<div class="bloc bloc-form">
<p><strong>Signalement (non urgent)</strong></p>

<div class="form-group">
<select id="type">
<option value="">Type de situation</option>
<option>Violence</option>
<option>Harcèlement</option>
</select>
</div>

<div class="form-group">
<input id="loc" placeholder="Ville">
</div>

<button class="btn-envoyer" onclick="send()">Envoyer</button>
</div>

<!-- FOOTER -->
<footer>
Ligne Espoir — Bénin
</footer>

<div id="toast">Envoyé</div>

<script>
function quitterVite() {
window.location.replace('https://www.google.com');
}

function send() {
const t = document.getElementById('type').value;
const l = document.getElementById('loc').value;

if (!t || !l) {
alert("Remplis les champs");
return;
}

const msg = encodeURIComponent("Signalement: " + t + " à " + l);
window.open("https://wa.me/2290164596381?text=" + msg);

const toast = document.getElementById("toast");
toast.classList.add("show");
setTimeout(() => toast.classList.remove("show"), 3000);
}
</script>

</body>
</html>
